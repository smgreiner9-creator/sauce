name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build VST3 + CLAP
        run: cargo xtask bundle sauce --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        run: iscc installer/sauce.iss

      - name: Zip VST3 bundle
        run: Compress-Archive -Path "target/bundled/Sauce.vst3" -DestinationPath "Sauce-vst3.zip"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/SauceInstaller.exe
            Sauce-vst3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
